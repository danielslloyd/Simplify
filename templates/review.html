<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Text Simplifier — Review</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="container">

    <!-- Header bar -->
    <div class="header-bar">
      <span class="section-label">{{ section }}</span>
      <span class="chunk-counter">Sentence {{ chunk_index + 1 }} of {{ total }}</span>
      <div class="nav-buttons">
        {% if chunk_index > 0 %}
          <a href="/review/{{ chunk_index - 1 }}" class="btn btn-nav">◀</a>
        {% endif %}
        {% if chunk_index + 1 < total %}
          <a href="/review/{{ chunk_index + 1 }}" class="btn btn-nav">▶</a>
        {% endif %}
        <a href="/chapters" class="btn btn-nav" title="Edit chapter splits">⋮</a>
      </div>
    </div>

    <!-- Original sentence -->
    <div class="panel">
      <div class="panel-title">ORIGINAL</div>
      <div class="sentence-text" id="sentence-text">{{ chunk.original }}</div>
    </div>

    <!-- Loading -->
    <div class="panel loading-panel" id="loading-panel" style="display:none">
      <div class="spinner"></div>
      <span>Analyzing sentence…</span>
    </div>

    <!-- Error -->
    <div class="panel error-panel" id="error-panel" style="display:none">
      <div class="panel-title">Error</div>
      <div id="error-message"></div>
      <button class="btn btn-retry" onclick="loadAnalysis()">Retry</button>
    </div>

    <!-- Analysis result -->
    <div class="panel" id="analysis-panel" style="display:none">
      <div class="tier-row">
        <span class="tier-badge" id="tier-badge"></span>
        <span class="reason-text" id="reason-text"></span>
      </div>
    </div>

    <!-- Suggestion (red/yellow only) -->
    <div class="panel" id="suggestion-panel" style="display:none">
      <div class="panel-title">SUGGESTION</div>
      <div class="suggestion-sentence" id="suggestion-text"></div>
    </div>

    <!-- Action bar (pending) -->
    <div class="action-bar" id="action-bar" style="display:none">
      <button class="btn btn-accept" id="accept-btn" onclick="doAccept()">✓ Accept</button>
      <button class="btn btn-keep"   onclick="doKeep()">Keep Original</button>
      <button class="btn btn-edit"   onclick="showEditPanel()">✏️ Edit</button>
      <button class="btn btn-auto"   onclick="confirmAutoComplete()" style="margin-left:auto">Auto-complete rest…</button>
    </div>

    <!-- Edit panel -->
    <div class="panel" id="edit-panel" style="display:none">
      <div class="panel-title">CUSTOM EDIT</div>
      <textarea id="edit-textarea" class="edit-textarea" rows="3"></textarea>
      <div class="setup-actions" style="margin-top:8px">
        <button class="btn btn-primary" onclick="confirmEdit()">✓ Confirm</button>
        <button class="btn" onclick="cancelEdit()">Cancel</button>
      </div>
    </div>

    <!-- Result (already decided) -->
    <div class="panel" id="result-panel" style="display:none">
      <div class="result-row">
        <span id="result-label"></span>
        <span class="result-text" id="result-text"></span>
      </div>
      <div class="setup-actions" style="margin-top:10px">
        <button class="btn" onclick="undoAction()">↩ Undo</button>
        <button class="btn btn-auto" onclick="confirmAutoComplete()" style="margin-left:auto">Auto-complete rest…</button>
      </div>
    </div>

    <!-- Green auto-complete notice -->
    <div class="panel no-flags-panel" id="auto-panel" style="display:none">
      <span id="auto-message"></span>
      <button class="btn btn-nav" onclick="cancelAuto()" style="float:right">Cancel</button>
    </div>

    <!-- Prompt preview -->
    <details class="panel prompt-details" id="prompt-details" style="display:none">
      <summary>View LLM prompt</summary>
      <pre class="prompt-text" id="prompt-text"></pre>
    </details>

  </div>

  <script>
    const CHUNK_INDEX = {{ chunk_index }};
    const TOTAL = {{ total }};
    const CHUNK = {{ chunk | tojson }};

    let analysisData = null;
    let autoTimer = null;

    // ── Init ──────────────────────────────────────────────────────────────────

    document.addEventListener("DOMContentLoaded", () => {
      if (CHUNK.status === "complete") {
        renderResult();
      } else if (CHUNK.tier) {
        // Already analyzed (e.g. navigated back before completing)
        analysisData = CHUNK;
        renderAnalysis();
      } else {
        loadAnalysis();
      }
    });

    // ── Load analysis ─────────────────────────────────────────────────────────

    async function loadAnalysis() {
      setPanel("loading");
      try {
        const resp = await fetch(`/api/flags/${CHUNK_INDEX}`);
        const data = await resp.json();
        if (!resp.ok) {
          showError(data.error || "Unknown error", data.type);
          return;
        }
        analysisData = data;
        renderAnalysis();
      } catch (e) {
        showError("Network error: " + e.message, "network");
      }
    }

    // ── Render analysis ───────────────────────────────────────────────────────

    function renderAnalysis() {
      if (!analysisData) return;
      const { tier, reason, suggestion, prompt, action } = analysisData;

      // If already acted on, show result
      if (action && action !== "pending") {
        renderResult();
        return;
      }

      // Tier badge
      const badge = document.getElementById("tier-badge");
      const tierMap = {
        red:    { emoji: "🔴", label: "DIFFICULT",    cls: "tier-red"    },
        yellow: { emoji: "🟡", label: "MODERATE",     cls: "tier-yellow" },
        green:  { emoji: "🟢", label: "APPROPRIATE",  cls: "tier-green"  },
        error:  { emoji: "⚠️",  label: "PARSE ERROR",  cls: "tier-error"  },
      };
      const t = tierMap[tier] || tierMap.error;
      badge.textContent = `${t.emoji} ${t.label}`;
      badge.className = `tier-badge ${t.cls}`;

      document.getElementById("reason-text").textContent = reason || "";
      setPanel("analysis");

      // Prompt preview
      if (prompt) {
        document.getElementById("prompt-text").textContent = prompt;
        document.getElementById("prompt-details").style.display = "";
      }

      if (tier === "green") {
        // Auto-complete after 1.5 s
        startAutoComplete();
        return;
      }

      if (tier === "error") {
        document.getElementById("action-bar").style.display = "";
        document.getElementById("accept-btn").style.display = "none";
        document.getElementById("suggestion-panel").style.display = "none";
        return;
      }

      // red / yellow: show suggestion
      if (suggestion) {
        document.getElementById("suggestion-text").textContent = suggestion;
        document.getElementById("suggestion-panel").style.display = "";
      }

      document.getElementById("accept-btn").style.display = suggestion ? "" : "none";
      document.getElementById("action-bar").style.display = "";
    }

    // ── Green auto-complete ───────────────────────────────────────────────────

    function startAutoComplete() {
      let secs = 2;
      const msg = document.getElementById("auto-message");
      msg.textContent = `🟢 Already appropriate — moving on in ${secs}s…`;
      document.getElementById("auto-panel").style.display = "";

      autoTimer = setInterval(() => {
        secs--;
        if (secs <= 0) {
          clearInterval(autoTimer);
          completeAndAdvance("kept", CHUNK.original);
        } else {
          msg.textContent = `🟢 Already appropriate — moving on in ${secs}s…`;
        }
      }, 1000);
    }

    function cancelAuto() {
      clearInterval(autoTimer);
      autoTimer = null;
      document.getElementById("auto-panel").style.display = "none";
      document.getElementById("action-bar").style.display = "";
      document.getElementById("accept-btn").style.display = "none";
    }

    // ── Actions ───────────────────────────────────────────────────────────────

    async function doAccept() {
      const suggestion = analysisData?.suggestion || "";
      await completeAndAdvance("approved", suggestion);
    }

    async function doKeep() {
      await completeAndAdvance("kept", CHUNK.original);
    }

    function showEditPanel() {
      const ta = document.getElementById("edit-textarea");
      ta.value = analysisData?.suggestion || CHUNK.original;
      document.getElementById("action-bar").style.display = "none";
      document.getElementById("suggestion-panel").style.display = "none";
      document.getElementById("edit-panel").style.display = "";
      ta.focus();
    }

    function cancelEdit() {
      document.getElementById("edit-panel").style.display = "none";
      document.getElementById("action-bar").style.display = "";
      if (analysisData?.suggestion) document.getElementById("suggestion-panel").style.display = "";
    }

    async function confirmEdit() {
      const text = document.getElementById("edit-textarea").value.trim();
      if (!text) return;
      await completeAndAdvance("edited", text);
    }

    async function completeAndAdvance(action, finalText) {
      // Record action
      await fetch("/api/action", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ chunk_index: CHUNK_INDEX, action, final_text: finalText }),
      });

      // Mark complete
      const resp = await fetch(`/api/complete/${CHUNK_INDEX}`, { method: "POST" });
      const data = await resp.json();

      if (data.done) {
        await fetch("/api/export", { method: "POST" });
        document.body.innerHTML = `<div class="done-screen"><h1>All done!</h1><p>Output has been exported.</p></div>`;
      } else {
        window.location.href = `/review/${data.next}`;
      }
    }

    // ── Undo ──────────────────────────────────────────────────────────────────

    function renderResult() {
      const action = CHUNK.action || analysisData?.action;
      const finalText = CHUNK.final_text;
      const label = { approved: "✓ Accepted", kept: "Kept original", edited: "✏️ Edited" }[action] || action;

      document.getElementById("result-label").innerHTML = `<span class="action-${action}">${label}:</span>`;
      document.getElementById("result-text").textContent = finalText || CHUNK.original;
      setPanel("result");

      if (CHUNK.prompt) {
        document.getElementById("prompt-text").textContent = CHUNK.prompt;
        document.getElementById("prompt-details").style.display = "";
      }
    }

    async function undoAction() {
      await fetch("/api/action", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ chunk_index: CHUNK_INDEX, action: "pending", final_text: null }),
      });
      // Re-render with existing analysis
      if (CHUNK.tier) {
        analysisData = CHUNK;
        analysisData.action = "pending";
        renderAnalysis();
      } else {
        loadAnalysis();
      }
    }

    // ── Auto-complete rest ────────────────────────────────────────────────────

    async function confirmAutoComplete() {
      if (!confirm("Auto-complete all remaining sentences?\n\nRed/yellow → accept suggestion. Green → keep original.")) return;
      document.body.innerHTML = `<div class="done-screen"><div class="spinner"></div><p>Auto-completing…</p></div>`;
      await fetch("/api/auto_complete_rest", { method: "POST" });
      document.body.innerHTML = `<div class="done-screen"><h1>Auto-complete done!</h1><p>Output has been exported.</p></div>`;
    }

    // ── UI helpers ────────────────────────────────────────────────────────────

    function setPanel(state) {
      const panels = {
        loading: "loading-panel",
        error:   "error-panel",
        analysis: "analysis-panel",
        result:  "result-panel",
      };
      Object.values(panels).forEach(id => {
        document.getElementById(id).style.display = "none";
      });
      if (panels[state]) document.getElementById(panels[state]).style.display = "";
      // Hide other interactive panels
      if (state !== "result") {
        document.getElementById("action-bar").style.display = "none";
        document.getElementById("suggestion-panel").style.display = "none";
        document.getElementById("edit-panel").style.display = "none";
        document.getElementById("auto-panel").style.display = "none";
        document.getElementById("result-panel").style.display = "none";
      }
    }

    function showError(msg, type) {
      let extra = "";
      if (type === "connection") extra = `<br><small>Make sure Ollama is running.</small>`;
      if (type === "model") extra = `<br><small>Try: <code>ollama pull &lt;model&gt;</code></small>`;
      document.getElementById("error-message").innerHTML = escHtml(msg) + extra;
      setPanel("error");
    }

    function escHtml(str) {
      return String(str || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
  </script>
</body>
</html>
